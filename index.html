<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alyona's Group of Companies - Internal Discussions</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111827;
      --card: #1e293b;
      --card-2: #243247;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #60a5fa;
      --accent-2: #38bdf8;
      --success: #22c55e;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      --radius: 18px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(96, 165, 250, 0.14), transparent 30%),
        linear-gradient(180deg, #0b1220 0%, #0f172a 45%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      padding: 52px 0 28px;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .hero h2 {
      margin: 14px 0 0;
      font-size: 1.15rem;
      color: var(--muted);
      font-weight: 500;
    }

    .companies-section {
      padding: 10px 0 48px;
    }

    .companies-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 20px;
    }

    .company-card {
      grid-column: span 6;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: 0.22s ease;
    }

    .company-card:hover {
      transform: translateY(-3px);
      border-color: rgba(96, 165, 250, 0.35);
      background: rgba(255, 255, 255, 0.08);
    }

    .company-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .company-name {
      margin: 0;
      font-size: 1.32rem;
      letter-spacing: -0.02em;
    }

    .topic-count {
      white-space: nowrap;
      font-size: 0.84rem;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.22);
      color: #dcfce7;
    }

    .company-desc {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
      min-height: 76px;
    }

    .company-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      cursor: pointer;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #08111f;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .topics-wrap {
      margin-top: 18px;
      display: none;
    }

    .topics-wrap.open {
      display: block;
    }

    .topics-panel {
      margin-top: 6px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid var(--line);
    }

    .topics-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .topic-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }

    .topic-title {
      margin: 0 0 8px;
      font-size: 1.02rem;
    }

    .topic-desc {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.65;
    }

    .topic-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-secondary {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--line);
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .empty-state {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(255, 255, 255, 0.16);
      color: var(--muted);
      line-height: 1.7;
    }

    .footer {
      padding: 14px 0 32px;
      color: #94a3b8;
      text-align: center;
      font-size: 0.92rem;
    }

    @media (max-width: 920px) {
      .company-card {
        grid-column: span 12;
      }
    }

    @media (max-width: 640px) {
      .hero {
        padding-top: 34px;
      }

      .company-card {
        padding: 18px;
      }

      .company-header {
        flex-direction: column;
        align-items: start;
      }

      .company-desc {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>Alyona's Group of Companies</h1>
      <h2>Internal Discussions</h2>
    </div>
  </header>

  <main class="companies-section">
    <div class="container">
      <div id="companiesGrid" class="companies-grid"></div>
    </div>
  </main>

  <footer class="footer">
    Internal discussions dashboard
  </footer>

  <script>
    const companies = [
      {
        id: "holdings",
        name: "Alyona's Holdings",
        description: "Central holding structure for group-level planning, ownership logic, investment model discussions, and capital strategy.",
        topics: [
          {
            title: "Pre-analysis",
            description: "Initial discussion and evaluation page for the holdings and investment model structure.",
            file: "alyonas_holdings/pre-analysis.html"
          }
        ]
      },
      {
        id: "armoire",
        name: "Alyona's Armoire",
        description: "Kidswear retail business focused on product sales, customer growth, store-level expansion, and brand-building opportunities.",
        topics: []
      },
      {
        id: "solvics",
        name: "Alyona's Solvics",
        description: "Freight intelligence and remote service business focused on supply chain support, operations, and scalable service models.",
        topics: []
      },
      {
        id: "reventra",
        name: "Alyona's Reventra",
        description: "Trading and forwarding business concept focused on commercial execution, logistics support, and future market expansion.",
        topics: []
      },
      {
        id: "setu",
        name: "Alyona's Setu",
        description: "Future freight forwarding and trading idea intended for international expansion, especially US-facing business opportunities.",
        topics: []
      },
      {
        id: "anurveda",
        name: "Alyona's AnurVeda",
        description: "Ayurveda-focused business concept for internal research, pre-analysis, product direction, and structured feasibility thinking.",
        topics: [
          {
            title: "Pre-analysis",
            description: "Initial discussion and evaluation page for Alyona's AnurVeda concept and internal pre-analysis.",
            file: "alyonas_anurveda/pre-analysis.html"
          }
        ]
      },
      {
        id: "aeterna",
        name: "Alyona's Aeterna",
        description: "Future software development business intended to build digital systems, tools, and scalable technology solutions.",
        topics: []
      }
    ];

    const companiesGrid = document.getElementById("companiesGrid");

    function createTopicHTML(topics) {
      if (!topics || topics.length === 0) {
        return `
          <div class="topics-panel">
            <div class="empty-state">No topics added for this company yet.</div>
          </div>
        `;
      }

      const topicCards = topics.map(topic => `
        <div class="topic-card">
          <h4 class="topic-title">${topic.title}</h4>
          <p class="topic-desc">${topic.description}</p>
          <div class="topic-actions">
            <a class="btn-secondary" href="${topic.file}">Open Discussion</a>
          </div>
        </div>
      `).join("");

      return `
        <div class="topics-panel">
          <div class="topics-grid">
            ${topicCards}
          </div>
        </div>
      `;
    }

    function renderCompanies() {
      companiesGrid.innerHTML = companies.map((company, index) => `
        <article class="company-card">
          <div class="company-header">
            <h3 class="company-name">${company.name}</h3>
            <div class="topic-count">${company.topics.length} Topic${company.topics.length === 1 ? "" : "s"}</div>
          </div>

          <p class="company-desc">${company.description}</p>

          <div class="company-actions">
            <button class="btn btn-primary" onclick="toggleTopics('topics-${index}')">Open Topics</button>
          </div>

          <div id="topics-${index}" class="topics-wrap">
            ${createTopicHTML(company.topics)}
          </div>
        </article>
      `).join("");
    }

    function toggleTopics(id) {
      const selected = document.getElementById(id);
      selected.classList.toggle("open");
    }

    renderCompanies();
  </script>
</body>
</html>
